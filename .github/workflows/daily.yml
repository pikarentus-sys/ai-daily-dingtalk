name: AI Daily Push

on:
  schedule:
    # UTC 9:30 = 北京时间 17:30（AIBase日报下午发布，此时间当天内容已更新）
    - cron: "30 9 * * *"
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python maomao.py