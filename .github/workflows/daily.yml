name: AI Daily Push

on:
  schedule:
    # UTC 0:00 = 北京时间 8:00
    - cron: "0 0 * * *"
  workflow_dispatch:  # 允许手动触发测试

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python maomao.py
