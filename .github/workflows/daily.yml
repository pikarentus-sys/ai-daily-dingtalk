name: AI Daily Push

on:
  schedule:
    # UTC 23:38 = 北京时间 7:38（GitHub 只认 UTC）
    - cron: "38 23 * * *"
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python maomao.py